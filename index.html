<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savitri Success Library - Pro V5.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%); }
    .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .seat-box { border: 2px solid #e2e8f0; transition: 0.3s; cursor: pointer; }
    .occupied { background: #ecfdf5; border-color: #10b981; }
  </style>
</head>
<body class="bg-slate-50">

  <div id="loginScreen" class="fixed inset-0 gradient-bg flex items-center justify-center z-50">
    <div class="glass p-8 rounded-3xl w-80 text-center text-white">
      <h1 class="text-2xl font-bold mb-6">SSL Admin Login</h1>
      <input type="text" id="admUser" placeholder="Admin ID" class="w-full p-2 mb-3 rounded text-black outline-none">
      <input type="password" id="admPass" placeholder="Password" class="w-full p-2 mb-4 rounded text-black outline-none">
      <button onclick="loginAdmin()" class="w-full bg-emerald-500 py-2 rounded font-bold">Login</button>
      <p class="mt-4 text-xs opacity-70">Use admin / 7023</p>
    </div>
  </div>

  <div id="adminPanel" class="hidden">
    <nav class="gradient-bg p-4 text-white flex justify-between items-center shadow-lg">
      <h2 class="font-bold">Savitri Admin Portal</h2>
      <button onclick="openAddModal()" class="bg-white text-indigo-700 px-4 py-1 rounded-lg font-bold text-sm">+ Add Student</button>
    </nav>

    <div class="p-4 space-y-6">
      <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="font-bold mb-3">Live Seat View</h3>
        <div id="seatGrid" class="grid grid-cols-5 md:grid-cols-10 gap-2"></div>
      </div>

      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-left text-sm">
          <thead class="bg-slate-100">
            <tr>
              <th class="p-3">Student Name</th>
              <th class="p-3">Seat</th>
              <th class="p-3">Phone</th>
              <th class="p-3">Action</th>
            </tr>
          </thead>
          <tbody id="studentTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="addModal" class="modal">
    <div class="bg-white p-6 rounded-2xl w-80 space-y-3">
      <h3 class="font-bold text-lg">Add New Student</h3>
      <input type="text" id="stName" placeholder="Full Name" class="w-full border p-2 rounded">
      <input type="number" id="stSeat" placeholder="Seat Number" class="w-full border p-2 rounded">
      <input type="text" id="stPhone" placeholder="Phone (Parent)" class="w-full border p-2 rounded">
      <input type="password" id="stPin" placeholder="Set Login PIN" class="w-full border p-2 rounded">
      <div class="flex gap-2">
        <button onclick="saveStudent()" class="flex-1 bg-indigo-600 text-white py-2 rounded font-bold">Save</button>
        <button onclick="closeAddModal()" class="flex-1 bg-slate-200 py-2 rounded">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // 1. Firebase Config (APNI DETAILS YAHAN DALEIN)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT.firebaseio.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "...",
      appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Admin Login
    function loginAdmin() {
      const u = document.getElementById('admUser').value;
      const p = document.getElementById('admPass').value;
      if(u === "admin" && p === "7023") {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        loadData();
      } else {
        alert("Invalid Login!");
      }
    }

    // 3. Modal Controls
    function openAddModal() { document.getElementById('addModal').classList.add('active'); }
    function closeAddModal() { document.getElementById('addModal').classList.remove('active'); }

    // 4. SAVE STUDENT TO FIREBASE
    function saveStudent() {
      const name = document.getElementById('stName').value;
      const seat = document.getElementById('stSeat').value;
      const phone = document.getElementById('stPhone').value;
      const pin = document.getElementById('stPin').value;

      if(!name || !seat || !pin) return alert("Please fill all fields!");

      const newRef = db.ref('students').push();
      newRef.set({
        name: name,
        seat: seat,
        phone: phone,
        pin: pin,
        feeStatus: "Paid",
        addedOn: new Date().toLocaleDateString()
      }).then(() => {
        alert("Student Added Successfully!");
        closeAddModal();
        // Clear Inputs
        document.getElementById('stName').value = '';
        document.getElementById('stSeat').value = '';
        document.getElementById('stPhone').value = '';
        document.getElementById('stPin').value = '';
      });
    }

    // 5. LOAD & DISPLAY DATA
    function loadData() {
      db.ref('students').on('value', snap => {
        const students = snap.val() || {};
        const table = document.getElementById('studentTable');
        const grid = document.getElementById('seatGrid');
        
        table.innerHTML = '';
        grid.innerHTML = '';

        // Render Seats (1 to 50)
        for(let i=1; i<=50; i++) {
          const owner = Object.values(students).find(s => s.seat == i);
          grid.innerHTML += `
            <div class="seat-box p-2 text-center rounded text-xs ${owner ? 'occupied' : ''}">
              ${i}<br><span class="text-[9px]">${owner ? owner.name.split(' ')[0] : 'Empty'}</span>
            </div>
          `;
        }

        // Render List
        Object.keys(students).forEach(id => {
          const s = students[id];
          table.innerHTML += `
            <tr class="border-b">
              <td class="p-3 font-medium">${s.name}</td>
              <td class="p-3">${s.seat}</td>
              <td class="p-3">${s.phone || '-'}</td>
              <td class="p-3 text-rose-500 font-bold cursor-pointer" onclick="deleteStudent('${id}')">Delete</td>
            </tr>
          `;
        });
      });
    }

    // 6. DELETE STUDENT
    function deleteStudent(id) {
      if(confirm("Are you sure?")) {
        db.ref(`students/${id}`).remove();
      }
    }
  </script>
</body>
</html>
