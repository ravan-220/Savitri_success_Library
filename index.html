<script>
let currentUser = null;
let currentStudentId = null;
let qrSessionId = null;
let charts = {};
let db = {};
let settings = {};
let connectionTimer;

// Firebase Config (replace with your config or use localStorage)
const firebaseConfig = {
  // Add your Firebase config here OR use localStorage mode
  // For demo: we'll use localStorage
};

// Initialize localStorage database
function initDB() {
  if (!localStorage.getItem('savitriDB')) {
    db = {
      students: {},
      attendance: {},
      settings: {
        openTime: '09:00',
        lateAfter: '10:00',
        closeTime: '18:00',
        minHours: 2,
        qrExpiry: 300,
        attendanceMode: 'hybrid',
        requireQr: false,
        feePlan: 'Monthly ₹2000'
      },
      holidays: {},
      fees: {},
      seats: {},
      notifications: [],
      audit: [],
      corrections: []
    };
    saveDB();
  } else {
    db = JSON.parse(localStorage.getItem('savitriDB'));
  }
  loadSettings();
}

// Save entire database
function saveDB() {
  localStorage.setItem('savitriDB', JSON.stringify(db));
  updateConnectionStatus(true);
}

// Load settings
function loadSettings() {
  settings = db.settings || {};
  ['settingOpenTime', 'settingLateAfter', 'settingCloseTime', 'settingMinHours', 
   'settingQrExpiry', 'settingFeePlan', 'settingAttendanceMode'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = settings[id.replace('setting', '')] || '';
  });
  document.getElementById('settingRequireQr').checked = settings.requireQr || false;
}

// Connection status
function updateConnectionStatus(connected) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (connected) {
    dot.className = 'w-2 h-2 rounded-full bg-emerald-500 sync-pulse';
    text.textContent = 'Synced';
  } else {
    dot.className = 'w-2 h-2 rounded-full bg-rose-500 sync-pulse';
    text.textContent = 'Offline';
  }
}

// Staff Login Functions
function showStaffLogin() {
  document.getElementById('mainButtons').classList.add('hidden');
  document.getElementById('staffLoginForm').classList.remove('hidden');
}

function showStudentLogin() {
  document.getElementById('mainButtons').classList.add('hidden');
  document.getElementById('studentLoginForm').classList.remove('hidden');
  loadStudentsForLogin();
}

function backToMain() {
  document.getElementById('mainButtons').classList.remove('hidden');
  document.getElementById('staffLoginForm').classList.add('hidden');
  document.getElementById('studentLoginForm').classList.add('hidden');
}

async function verifyStaff() {
  const id = document.getElementById('staffId').value;
  const pass = document.getElementById('staffPass').value;
  
  // Demo credentials: staff/1234, admin/admin
  if ((id === 'staff' && pass === '1234') || (id === 'admin' && pass === 'admin')) {
    currentUser = { type: 'staff', id, name: id === 'staff' ? 'Staff Operator' : 'Admin' };
    document.getElementById('staffWelcome').textContent = `Welcome, ${currentUser.name}`;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminDashboard').classList.remove('hidden');
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString();
    initAdminDashboard();
    logAudit('Staff Login', currentUser.id);
  } else {
    alert('Invalid credentials');
  }
}

async function loadStudentsForLogin() {
  const select = document.getElementById('studentSelect');
  select.innerHTML = '<option value="">👤 Select Your Name</option>';
  
  Object.values(db.students || {}).forEach(student => {
    if (student.active !== false) {
      const option = document.createElement('option');
      option.value = student.id;
      option.textContent = `${student.name} (${student.roll || 'N/A'})`;
      select.appendChild(option);
    }
  });
}

async function verifyStudent() {
  const studentId = document.getElementById('studentSelect').value;
  const pass = document.getElementById('studentPass').value;
  
  const student = db.students[studentId];
  if (student && student.password === pass) {
    currentStudentId = studentId;
    showStudentDashboard(student);
    logAudit('Student Login', student.name);
  } else {
    alert('Invalid student or password');
  }
}

// Admin Dashboard Functions
function initAdminDashboard() {
  updateStats();
  renderStudentsTable();
  renderAttendanceTable();
  renderHolidays();
  renderSeats();
  renderFees();
  renderAudit();
  renderNotifications();
  initCharts();
  connectionTimer = setInterval(updateStats, 5000);
}

function switchAdminTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('hidden'));
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
  
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}

function updateStats() {
  const students = Object.values(db.students || {}).filter(s => s.active !== false);
  const today = new Date().toISOString().split('T')[0];
  const todayAttendance = Object.values(db.attendance || {})
    .filter(a => a.date === today && a.status !== 'Holiday');
  
  document.getElementById('statStudents').textContent = students.length;
  document.getElementById('statPresent').textContent = todayAttendance.filter(a => a.status === 'Checked Out' || (a.status === 'Checked In' && !a.checkout)).length;
  document.getElementById('statAbsent').textContent = students.length - todayAttendance.length;
  document.getElementById('statLate').textContent = todayAttendance.filter(a => a.flags?.includes('late')).length;
  document.getElementById('statAvgHours').textContent = '2.3h';
  document.getElementById('statQr').textContent = qrSessionId ? 'Yes' : 'No';
}

function logout() {
  currentUser = null;
  currentStudentId = null;
  qrSessionId = null;
  document.getElementById('adminDashboard').classList.add('hidden');
  document.getElementById('studentDashboard').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  if (charts.trend) charts.trend.destroy();
  if (connectionTimer) clearInterval(connectionTimer);
}

// Student Dashboard
function showStudentDashboard(student) {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('studentDashboard').classList.remove('hidden');
  
  document.getElementById('studentNavName').textContent = student.name;
  document.getElementById('studentDisplayName').textContent = student.name;
  document.getElementById('studentDisplayMeta').textContent = `Roll ${student.roll || 'N/A'} | Batch ${student.batch || 'N/A'}`;
  document.getElementById('studentSeatNo').textContent = student.seat || '-';
  document.getElementById('studentFeeStatus').textContent = db.fees[student.id]?.status || 'Paid';
  
  updateStudentStats(student.id);
}

// Charts
function initCharts() {
  const ctx1 = document.getElementById('trendChart').getContext('2d');
  charts.trend = new Chart(ctx1, {
    type: 'line',
    data: { labels: ['S', 'M', 'T', 'W', 'T', 'F', 'S'], datasets: [{ data: [3,5,4,6,2,7,5], borderColor: '#6366f1' }] },
    options: { scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
  });
}

// Students Table
function renderStudentsTable() {
  const tbody = document.getElementById('studentsTable');
  const search = document.getElementById('studentSearch').value.toLowerCase();
  const statusFilter = document.getElementById('studentStatusFilter').value;
  const feeFilter = document.getElementById('studentFeeFilter').value;
  
  let students = Object.values(db.students || {});
  if (search) students = students.filter(s => s.name.toLowerCase().includes(search) || s.roll?.includes(search));
  if (statusFilter !== 'all') students = students.filter(s => (s.active !== false) === (statusFilter === 'active'));
  if (feeFilter !== 'all') students = students.filter(s => (db.fees[s.id]?.status || 'Paid') === feeFilter);
  
  tbody.innerHTML = students.map(s => `
    <tr>
      <td class="px-3 py-3 font-medium">${s.name}<br><span class="text-xs text-slate-500">${s.roll || ''}</span></td>
      <td class="px-3 py-3">${s.batch || '-'}</td>
      <td class="px-3 py-3">${s.seat || '-'}</td>
      <td class="px-3 py-3">${s.phone || '-'}</td>
      <td class="px-3 py-3"><span class="px-2 py-1 rounded-full text-xs ${getFeeColor(s.id)}">${db.fees[s.id]?.status || 'Paid'}</span></td>
      <td class="px-3 py-3"><span class="px-2 py-1 rounded-full text-xs ${s.active === false ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}">${s.active === false ? 'Archived' : 'Active'}</span></td>
      <td class="px-3 py-3">
        <button onclick="editStudent('${s.id}')" class="text-indigo-600 text-xs mr-2">Edit</button>
        <button onclick="toggleStudentStatus('${s.id}')" class="text-rose-600 text-xs">${s.active === false ? 'Activate' : 'Archive'}</button>
      </td>
    </tr>
  `).join('');
}

function getFeeColor(studentId) {
  const status = db.fees[studentId]?.status || 'Paid';
  if (status === 'Paid') return 'bg-emerald-100 text-emerald-700';
  if (status === 'Due') return 'bg-amber-100 text-amber-700';
  return 'bg-rose-100 text-rose-700';
}

// Add more functions for modals, QR, attendance, etc.
function openStudentModal() { alert('Student modal - implement add/edit form'); }
function openImportModal() { alert('CSV Import modal'); }
function openQRModal() { alert('QR Session modal'); }
function openHolidayModal() { alert('Holiday modal'); }
function toggleStudentStatus(id) { alert(`Toggle status for ${id}`); }
function editStudent(id) { alert(`Edit student ${id}`); }
function saveSettings() { alert('Settings saved'); }
function backupDatabase() { 
  const data = JSON.stringify(db, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'savitri-backup.json'; a.click();
}
function restoreDatabase(e) { alert('Restore functionality'); }
function sendNotification() { alert('Notification sent'); }
function logAudit(action, details) {
  db.audit.unshift({ timestamp: new Date().toISOString(), action, user: currentUser?.id || 'Student', details });
  saveDB();
}
function clearAllData() { if(confirm('Delete everything?')) localStorage.clear(); location.reload(); }

// Attendance Actions
function handleAttendanceAction(qrData, action, method) {
  if (!currentStudentId) return;
  
  const now = new Date();
  const record = db.attendance[`${currentStudentId}_${now.toISOString().split('T')[0]}`] || {};
  
  if (action === 'checkin' && !record.checkin) {
    record.checkin = now.toISOString();
    record.status = 'Checked In';
    record.method = method;
  } else if (action === 'checkout' && record.checkin && !record.checkout) {
    record.checkout = now.toISOString();
    record.status = 'Checked Out';
    record.duration = (now - new Date(record.checkin)) / (1000 * 60 * 60);
  }
  
  db.attendance[`${currentStudentId}_${now.toISOString().split('T')[0]}`] = record;
  saveDB();
  updateStudentStats(currentStudentId);
  alert(`${action === 'checkin' ? 'Checked In' : 'Checked Out'} successfully!`);
}

function updateStudentStats(studentId) {
  const today = new Date().toISOString().split('T')[0];
  const record = db.attendance[`${studentId}_${today}`];
  
  document.getElementById('myStatusBadge').textContent = record?.status || 'Not Marked';
  document.getElementById('myStatusBadge').className = `px-2 py-1 rounded text-xs font-bold ${record?.status === 'Checked In' ? 'bg-emerald-100 text-emerald-700' : record?.status === 'Checked Out' ? 'bg-blue-100 text-blue-700' : 'bg-slate-200'}`;
  document.getElementById('myCheckIn').textContent = record?.checkin ? new Date(record.checkin).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
  document.getElementById('myCheckOut').textContent = record?.checkout ? new Date(record.checkout).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
  document.getElementById('myDuration').textContent = record?.duration ? `${record.duration.toFixed(1)}h` : '--';
}

// QR Scanner
let html5QrCode;
function toggleScanner() {
  const reader = document.getElementById('reader');
  const btn = document.getElementById('scannerBtn');
  
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      reader.innerHTML = '';
      html5QrCode = null;
      btn.textContent = 'Start Camera';
    });
  } else {
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      (decodedText) => {
        handleAttendanceAction(decodedText, 'checkin', 'qr');
        html5QrCode.stop();
      }
    ).catch(err => console.error('Scanner error:', err));
    btn.textContent = 'Stop Camera';
  }
}

// Initialize
initDB();
updateConnectionStatus(true);
</script>
